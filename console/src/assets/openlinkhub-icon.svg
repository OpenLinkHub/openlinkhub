<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>OpenLinkHub icon</title>
  <desc>Open connection hub mark with realtime voice pulse and linked provider nodes.</desc>
  <defs>
    <linearGradient id="cyanArc" x1="132" y1="512" x2="512" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
